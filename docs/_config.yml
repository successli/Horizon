theme: jekyll-theme-cayman
title: Horizon Daily
description: AI-curated daily digest of tech and research news
baseurl: "" # served from the root of ai-news.successli.cn
url: "https://ai-news.successli.cn" # the base hostname & protocol for the daily site

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
