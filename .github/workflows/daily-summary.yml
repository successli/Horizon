name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC / 08:00 Beijing
  workflow_dispatch:      # Allow manual trigger

concurrency:
  group: daily-horizon-summary
  cancel-in-progress: true

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        timeout-minutes: 35
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your config.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Commit generated summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/summaries docs/_posts 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated summary changes to commit."
          else
            git commit -F - <<'EOF'
          Generate Horizon daily summary

          Constraint: Generated by scheduled GitHub Actions from configured feeds and AI provider.
          Confidence: high
          Scope-risk: narrow
          Directive: Keep generated summaries reproducible from data/config.json and workflow secrets.
          Tested: uv run horizon --hours 24 completed in CI.
          Not-tested: Local DeepSeek run is not repeated during commit.
          EOF
            git push origin HEAD:main
          fi

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name horizon-ai-news --branch main
